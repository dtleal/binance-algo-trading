name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} bash -s <<'EOF'
          set -euo pipefail
          APP_DIR=/opt/binance-trader
          mkdir -p $APP_DIR/logs

          cat > $APP_DIR/.env <<ENVEOF
          API_KEY=${{ secrets.BINANCE_API_KEY }}
          SECRET_KEY=${{ secrets.BINANCE_SECRET_KEY }}
          SOCKS_PROXY=socks5://host.docker.internal:1081
          ENVEOF
          chmod 600 $APP_DIR/.env

          cat > $APP_DIR/docker-compose.yml <<'COMPEOF'
          services:
            bot-axs:
              image: ghcr.io/lucasgouvea/binance-trader:latest
              container_name: binance-bot-axs
              command: ["python", "-m", "trader", "bot", "--symbol", "axsusdt", "--leverage", "5"]
              env_file: .env
              extra_hosts:
                - "host.docker.internal:host-gateway"
              volumes:
                - ./logs:/app/logs
              restart: unless-stopped
              deploy:
                resources:
                  limits:
                    memory: 256M

            bot-sand:
              image: ghcr.io/lucasgouvea/binance-trader:latest
              container_name: binance-bot-sand
              command: ["python", "-m", "trader", "bot", "--symbol", "sandusdt", "--leverage", "5", "--capital", "30"]
              env_file: .env
              extra_hosts:
                - "host.docker.internal:host-gateway"
              volumes:
                - ./logs:/app/logs
              restart: unless-stopped
              deploy:
                resources:
                  limits:
                    memory: 256M
          COMPEOF

          echo "--- Logging in to GHCR ---"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          cd $APP_DIR
          docker compose pull
          docker compose up -d

          echo "--- Container status ---"
          docker compose ps
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
