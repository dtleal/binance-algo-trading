name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            APP_DIR=/opt/binance-trader
            mkdir -p $APP_DIR/logs

            cat > $APP_DIR/.env <<'ENVEOF'
            API_KEY=${{ secrets.BINANCE_API_KEY }}
            SECRET_KEY=${{ secrets.BINANCE_SECRET_KEY }}
            ENVEOF
            chmod 600 $APP_DIR/.env

            cat > $APP_DIR/docker-compose.yml <<'COMPEOF'
            services:
              bot-axs:
                image: ghcr.io/${{ github.repository }}:latest
                container_name: binance-bot-axs
                command: ["python", "-m", "trader", "bot", "--symbol", "axsusdt", "--leverage", "5"]
                env_file: .env
                volumes:
                  - ./logs:/app/logs
                restart: unless-stopped
                deploy:
                  resources:
                    limits:
                      memory: 256M

              bot-sand:
                image: ghcr.io/${{ github.repository }}:latest
                container_name: binance-bot-sand
                command: ["python", "-m", "trader", "bot", "--symbol", "sandusdt", "--leverage", "5"]
                env_file: .env
                volumes:
                  - ./logs:/app/logs
                restart: unless-stopped
                deploy:
                  resources:
                    limits:
                      memory: 256M
            COMPEOF

            cd $APP_DIR
            docker compose pull
            docker compose up -d

            echo "--- Container status ---"
            docker compose ps
